<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registretion Form</title>
</head>
<body>
    <form action="./registration.html" target="_blank" method="post" required>
        <fieldset>
            <h1 align="center">Student Registration Form</h1>
            <hr>
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter Your Full Name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter Valid Email Address" reqiured>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter Password" required>
            <br><br>
            <lable for="gender">Gender:</lable>
            <input type="radio" id="gender" name="gender">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender">
            <label for="female">Female</label>
            <input type="radio" id="gender" name="gender">
            <label for="others">others</label>
            <br><br>
            <label for="course">Course:</label>
            <select for="select" id="select">
                <option for="select">--select course--</option>
                <option for="mba">M.B.A</option>
                <option for="btech">B.Tech</option>
                <option for="mca">MCA</option>
            </select>
            <br><br>
            <label for="phone">Contact Number:</label>
            <input type="number" id="phone" placeholder="Enter Your Number" required>
            <br><br>
            <label for="address">Address:</label>
            <br>
            <textarea  type="text" id="address" placeholder="Enter Your Address here" rows='3' cols="40"></textarea>
            <br><br>
            <input type="submit" value="Register">
            <input type="submit" value="Reset">
            <hr>
            <h5 align="center">&copy;2025 Student Registration Portal</h4>
            <br>
        </fieldset>
    </form>
    
</body>
</html
