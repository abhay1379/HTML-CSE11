<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>experiment3</title>
</head>
<body>
    <form>
        <fieldset>

            <h2>Hotel Room Booking Form</h2>

            <lable for="Name">Full Name:</lable>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <lable for="phone">Phone:</lable>
            <input type="number" id="phone" name="phone" required>
            <br><br>
            <label for="date">check-in-date:</label>
            <input type="date" id="date" name="check-in-date" required>
            <br><br>
            <label for="date">check-out-date:</label>
            <input type="date" id="date" name="check-out-date" required>
            <br><br>
            <label for="select">Room Type:</label>
            <select id="select" name="select">
                <option value="single room">Single Room</option>
                <option value="double rooom">Double Room</option>
                <option value="triple room">Triple Room</option>
            </select>
            <br><br>
            <lable for="guests">Number of Guests:</lable>
            <input type="numbers" id="guests" name="number of guest" min="1" max="2" required>
            <br><br>
            <label for="request">Special Requests:</label>
            <br>
            <textarea name="spcial request" id="requests" rows="10" cols="30"></textarea>
                <br>
                <input type="submit" value="book now">
                <input type="submit" value="reset form">
        </fieldset>
    </form>
</body>
</html>
